<!DOCTYPE html>
<html>

<body>

    <h3>Object Demo</h3>

    <script>
        // Object represents a real-world entity
        const student = {
            name: "Rahul",
            branch: "CSE",
            cgpa: 8.4,
            city: "Jaipur"
        };

        console.log(
            student.name + " studies " + student.branch +
            " with CGPA " + student.cgpa
        );
    </script>

    <p>Check Console</p>

</body>

</html>
