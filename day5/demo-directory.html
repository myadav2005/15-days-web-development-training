<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Directory</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .student-card img {
            height: 180px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">Student Directory</h1>
        <p class="text-muted">Search and Filter Students (JavaScript Demo)</p>
    </div>

    <!-- Search & Filter -->
    <div class="row mb-4 g-3">
        <div class="col-md-8">
            <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="Search by name or email..."
            >
        </div>
        <div class="col-md-4">
            <select id="courseFilter" class="form-select">
                <option value="">All Courses</option>
                <option value="Web Development">Web Development</option>
                <option value="JavaScript">JavaScript</option>
                <option value="React">React</option>
            </select>
        </div>
    </div>

    <!-- Student Cards -->
    <div class="row g-4" id="studentList"></div>

</div>

<script>
    // Student Data (Array of Objects)
    const students = [
        {
            name: "Amit Sharma",
            email: "amit@example.com",
            course: "Web Development",
            image: "https://i.pravatar.cc/300?img=1"
        },
        {
            name: "Neha Verma",
            email: "neha@example.com",
            course: "JavaScript",
            image: "https://i.pravatar.cc/300?img=2"
        },
        {
            name: "Rahul Singh",
            email: "rahul@example.com",
            course: "React",
            image: "https://i.pravatar.cc/300?img=3"
        },
        {
            name: "Pooja Mehta",
            email: "pooja@example.com",
            course: "JavaScript",
            image: "https://i.pravatar.cc/300?img=4"
        },
        {
            name: "Karan Gupta",
            email: "karan@example.com",
            course: "Web Development",
            image: "https://i.pravatar.cc/300?img=5"
        }
    ];

    const studentList = document.getElementById("studentList");
    const searchInput = document.getElementById("searchInput");
    const courseFilter = document.getElementById("courseFilter");

    // Render Students
    function renderStudents(data) {
        studentList.innerHTML = "";

        if (data.length === 0) {
            studentList.innerHTML = `<p class="text-center text-muted">No students found</p>`;
            return;
        }

        data.forEach(student => {
            studentList.innerHTML += `
                <div class="col-md-4">
                    <div class="card student-card shadow-sm">
                        <img src="${student.image}" class="card-img-top" alt="Student">
                        <div class="card-body text-center">
                            <h5 class="card-title">${student.name}</h5>
                            <p class="mb-1">Course: ${student.course}</p>
                            <p class="text-muted small">${student.email}</p>
                            <button class="btn btn-outline-primary btn-sm">
                                View Profile
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Search & Filter Logic
    function filterStudents() {
        const searchValue = searchInput.value.toLowerCase();
        const selectedCourse = courseFilter.value;

        const filtered = students.filter(student => {
            const matchesSearch =
                student.name.toLowerCase().includes(searchValue) ||
                student.email.toLowerCase().includes(searchValue);

            const matchesCourse =
                selectedCourse === "" || student.course === selectedCourse;

            return matchesSearch && matchesCourse;
        });

        renderStudents(filtered);
    }

    // Event Listeners
    searchInput.addEventListener("keyup", filterStudents);
    courseFilter.addEventListener("change", filterStudents);

    // Initial Load
    renderStudents(students);
</script>

</body>
</html>
