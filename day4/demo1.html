<!DOCTYPE html>
<html>
<head>
  <title>Live Character Counter</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<h3>Live Character Counter</h3>

<textarea id="message" rows="5" cols="40"></textarea>
<p>Characters: <span id="count">0</span></p>

<script>
  // JavaScript Version
  document.getElementById("message").addEventListener("keyup", function () {
    document.getElementById("count").innerText = this.value.length;
  });

  // jQuery Version (show difference)
  /*
  $("#message").keyup(function () {
    $("#count").text(this.value.length);
  });
  */
</script>

</body>
</html>
