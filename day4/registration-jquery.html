<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Required for responsive Bootstrap -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Registration Form - jQuery Validation</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="row justify-content-center">

      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body">

            <h3 class="text-center mb-4">Registration Form</h3>

            <form id="registerForm">

              <!-- Name -->
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control">
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control">
              </div>

              <!-- Gender -->
              <div class="mb-3">
                <label class="form-label">Gender</label><br>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female" class="ms-3"> Female
              </div>

              <!-- Course -->
              <div class="mb-3">
                <label class="form-label">Course</label>
                <select id="course" class="form-select">
                  <option value="">Select Course</option>
                  <option>B.Tech</option>
                  <option>BCA</option>
                  <option>MCA</option>
                </select>
              </div>

              <!-- Skills -->
              <div class="mb-3">
                <label class="form-label">Skills</label><br>
                <input type="checkbox" class="skill"> HTML
                <input type="checkbox" class="skill ms-3"> CSS
                <input type="checkbox" class="skill ms-3"> JavaScript
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control">
              </div>

              <!-- Confirm Password -->
              <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" class="form-control">
              </div>

              <!-- Terms -->
              <div class="mb-3">
                <input type="checkbox" id="terms">
                <label>I agree to terms & conditions</label>
              </div>

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                  Register
                </button>
              </div>

            </form>

          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- jQuery Validation Script -->
  <script>
    $(document).ready(function () {

      $("#registerForm").submit(function (event) {

        event.preventDefault();
        // Stop form submission

        // Get values using jQuery
        let name = $("#name").val().trim();
        let email = $("#email").val().trim();
        let password = $("#password").val();
        let confirmPassword = $("#confirmPassword").val();
        let course = $("#course").val();
        let terms = $("#terms").is(":checked");

        // Gender validation
        if ($("input[name='gender']:checked").length === 0) {
          alert("Please select gender");
          return;
        }

        // Skill validation
        if ($(".skill:checked").length === 0) {
          alert("Please select at least one skill");
          return;
        }

        // Other validations
        if (name === "") {
          alert("Name is required");
          return;
        }

        if (email === "") {
          alert("Email is required");
          return;
        }

        if (course === "") {
          alert("Please select course");
          return;
        }

        if (password.length < 6) {
          alert("Password must be at least 6 characters");
          return;
        }

        if (password !== confirmPassword) {
          alert("Passwords do not match");
          return;
        }

        if (!terms) {
          alert("Please accept terms & conditions");
          return;
        }

        // If all validations pass
        alert("Registration Successful!");

      });

    });
  </script>

</body>
</html>
