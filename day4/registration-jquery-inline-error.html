<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form - jQuery Inline Validation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow">
                    <div class="card-body">

                        <h3 class="text-center mb-4">Registration Form</h3>

                        <form id="registerForm">

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="name" class="form-control">
                                <span class="text-danger" id="nameError"></span>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-control">
                                <span class="text-danger" id="emailError"></span>
                            </div>

                            <!-- Gender -->
                            <div class="mb-3">
                                <label class="form-label">Gender</label><br>
                                <input type="radio" name="gender"> Male
                                <input type="radio" name="gender" class="ms-3"> Female
                                <br>
                                <span class="text-danger" id="genderError"></span>
                            </div>

                            <!-- Course -->
                            <div class="mb-3">
                                <label class="form-label">Course</label>
                                <select id="course" class="form-select">
                                    <option value="">Select Course</option>
                                    <option>B.Tech</option>
                                    <option>BCA</option>
                                    <option>MCA</option>
                                </select>
                                <span class="text-danger" id="courseError"></span>
                            </div>

                            <!-- Skills -->
                            <div class="mb-3">
                                <label class="form-label">Skills</label><br>
                                <input type="checkbox" class="skill"> HTML
                                <input type="checkbox" class="skill ms-3"> CSS
                                <input type="checkbox" class="skill ms-3"> JavaScript
                                <br>
                                <span class="text-danger" id="skillError"></span>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control">
                                <span class="text-danger" id="passwordError"></span>
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control">
                                <span class="text-danger" id="confirmPasswordError"></span>
                            </div>

                            <!-- Terms -->
                            <div class="mb-3">
                                <input type="checkbox" id="terms">
                                <label>I agree to terms & conditions</label><br>
                                <span class="text-danger" id="termsError"></span>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Register</button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery Validation -->
    <script>
        $(document).ready(function () {

            $("#registerForm").submit(function (event) {
                event.preventDefault();

                // Clear previous errors
                $(".text-danger").text("");

                let isValid = true;

                // Name
                if ($("#name").val().trim() === "") {
                    $("#nameError").text("Name is required");
                    isValid = false;
                }

                // Email
                if ($("#email").val().trim() === "") {
                    $("#emailError").text("Email is required");
                    isValid = false;
                }

                // Gender
                if ($("input[name='gender']:checked").length === 0) {
                    $("#genderError").text("Please select gender");
                    isValid = false;
                }

                // Course
                if ($("#course").val() === "") {
                    $("#courseError").text("Please select course");
                    isValid = false;
                }

                // Skills
                if ($(".skill:checked").length === 0) {
                    $("#skillError").text("Select at least one skill");
                    isValid = false;
                }

                // Password
                if ($("#password").val().length < 6) {
                    $("#passwordError").text("Password must be at least 6 characters");
                    isValid = false;
                }

                // Confirm Password
                if ($("#password").val() !== $("#confirmPassword").val()) {
                    $("#confirmPasswordError").text("Passwords do not match");
                    isValid = false;
                }

                // Terms
                if (!$("#terms").is(":checked")) {
                    $("#termsError").text("Please accept terms & conditions");
                    isValid = false;
                }

                // Final success
                if (isValid) {
                    alert("Registration Successful!");
                }

            });

        });
    </script>

</body>

</html>
