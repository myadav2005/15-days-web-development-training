<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Required for responsive Bootstrap -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registration Form with JS Validation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container-fluid mt-5">
        <div class="row justify-content-center">

            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">

                        <h3 class="text-center mb-4">Registration Form</h3>

                        <!-- Registration Form -->
                        <form id="registerForm" ons>

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="name" class="form-control">
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="text" id="email" class="form-control">
                            </div>

                            <!-- Gender (Radio Buttons) -->
                            <div class="mb-3">
                                <label class="form-label">Gender</label><br>
                                <input type="radio" name="gender" value="Male"> Male
                                <input type="radio" name="gender" value="Female" class="ms-3"> Female
                            </div>

                            <!-- Course (Dropdown / Select) -->
                            <div class="mb-3">
                                <label class="form-label">Course</label>
                                <select id="course" class="form-select">
                                    <option value="">Select Course</option>
                                    <option>B.Tech</option>
                                    <option>BCA</option>
                                    <option>MCA</option>
                                </select>
                            </div>

                            <!-- Skills (Checkbox) -->
                            <div class="mb-3">
                                <label class="form-label">Skills</label><br>
                                <input type="checkbox" value="HTML" class="skill"> HTML
                                <input type="checkbox" value="CSS" class="skill ms-3"> CSS
                                <input type="checkbox" value="JavaScript" class="skill ms-3"> JavaScript
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control">
                            </div>

                            <!-- Confirm Password -->
                            <div class="mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control">
                            </div>

                            <!-- Terms Checkbox -->
                            <div class="mb-3">
                                <input type="checkbox" id="terms">
                                <label>I agree to terms & conditions</label>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    Register
                                </button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript Validation -->
    <script>
        document.getElementById("registerForm").addEventListener("submit", function (event) {

            event.preventDefault();
            // Prevent form submission

            // Get form values
            $('#name').val().trim();
            
            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value;
            let confirmPassword = document.getElementById("confirmPassword").value;
            let course = document.getElementById("course").value;
            let terms = document.getElementById("terms").checked;

            // Gender check
            let genderSelected = false;
            let genders = document.getElementsByName("gender");
            for (let i = 0; i < genders.length; i++) {
                if (genders[i].checked) {
                    genderSelected = true;
                }
            }

            // Skill check
            let skills = document.getElementsByClassName("skill");
            let skillSelected = false;
            for (let i = 0; i < skills.length; i++) {
                if (skills[i].checked) {
                    skillSelected = true;
                }
            }

            // Validation conditions
            if (name === "") {
                alert("Name is required");
                return;
            }

            if (email === "") {
                alert("Email is required");
                return;
            }

            if (!genderSelected) {
                alert("Please select gender");
                return;
            }

            if (course === "") {
                alert("Please select course");
                return;
            }

            if (!skillSelected) {
                alert("Please select at least one skill");
                return;
            }

            if (password.length < 6) {
                alert("Password must be at least 6 characters");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords do not match");
                return;
            }

            if (!terms) {
                alert("Please accept terms & conditions");
                return;
            }

            // If all validations pass
            alert("Registration Successful!");

        });
    </script>

</body>

</html>
