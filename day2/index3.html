<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style
    >
    .login-form{
        background-color: #eb5f5f;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        width: 300px;
        margin: 100px auto;
    }
    .login-form h2{
        margin-top:0;
        text-align: center;
    }
    .login-form label{
        display: block;
        margin-bottom: 5px;
    }
    .login-form input{
        background-color: #f2f2f2;
    border: 1px solid #ccc;
    border-radius: 3px;
    width: 280px;
    padding: 8px;
    display: block;
    }
    .login-form input:focus{
        outline: none;
        border-color: blue;
    }
</style>
</head>
<body>
    <div class="login-form">
 <h2>Login</h2>
    <form>
        <label>Email</label>
        <input type="email" placeholder="Enter email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>
    </div>
    
</body>
</html
