<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Directory</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f4f6f9;
        }
        .student-card img {
            height: 200px;
            object-fit: cover;
        }
        footer {
            background: #212529;
            color: #fff;
            padding: 15px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<!-- ================= HEADER ================= -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Student Directory</span>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<div class="container mt-5">

    <!-- Search Bar -->
    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <input 
                type="text" 
                id="searchInput" 
                class="form-control" 
                placeholder="Search student by name..."
            >
        </div>
    </div>

    <!-- Student Cards -->
    <div class="row" id="studentContainer">

        <!-- Student 1 -->
        <div class="col-md-4 mb-4 student-item">
            <div class="card student-card shadow-sm">
                <img src="https://i.pravatar.cc/300?img=1" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Amit Sharma</h5>
                    <p class="card-text">Web Development</p>
                    <p class="text-muted">amit@example.com</p>
                </div>
            </div>
        </div>

        <!-- Student 2 -->
        <div class="col-md-4 mb-4 student-item">
            <div class="card student-card shadow-sm">
                <img src="https://i.pravatar.cc/300?img=2" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Neha Verma</h5>
                    <p class="card-text">JavaScript</p>
                    <p class="text-muted">neha@example.com</p>
                </div>
            </div>
        </div>

        <!-- Student 3 -->
        <div class="col-md-4 mb-4 student-item">
            <div class="card student-card shadow-sm">
                <img src="https://i.pravatar.cc/300?img=3" class="card-img-top">
                <div class="card-body text-center">
                    <h5 class="card-title">Rahul Singh</h5>
                    <p class="card-text">React Basics</p>
                    <p class="text-muted">rahul@example.com</p>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ================= FOOTER ================= -->
<footer class="text-center">
    <div class="container">
        <p class="mb-0">© 2026 Student Directory | Demo Project</p>
    </div>
</footer>

<!-- ================= JAVASCRIPT ================= -->
<script>
    const searchInput = document.getElementById("searchInput");
    const students = document.querySelectorAll(".student-item");

    searchInput.addEventListener("keyup", function () {
        const value = this.value.toLowerCase();

        students.forEach(student => {
            const name = student.querySelector(".card-title").textContent.toLowerCase();

            if (name.includes(value)) {
                student.style.display = "block";
            } else {
                student.style.display = "none";
            }
        });
    });
</script>

</body>
</html>
