<script>
/* Without map (old way) */
let numbers = [1, 2, 3, 4];
let result = [];

for (let i = 0; i < numbers.length; i++) {
    result.push(numbers[i] * 2);
}

console.log(result);
</script>

<script> 
/* With map (new way) */

});

console.log(result);

</script>
