<!DOCTYPE html>
<html>

<head>
    <title>Loop API Data</title>
</head>

<body>
    <h2>Users List</h2>
    <ul id="userList"></ul>

    <script>
        fetch('https://jsonplaceholder.typicode.com/users')
            .then(res => res.json())
            .then(users => {
                users.forEach(user => {
                    const li = document.createElement("li");
                    li.textContent = user.name + " - " + user.email;
                    document.getElementById("userList").appendChild(li);
                });
            });
    </script>
</body>

</html>
