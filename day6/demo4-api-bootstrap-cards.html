<!DOCTYPE html>
<html>
<head>
  <title>User Cards</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h2 class="text-center mb-4">Live User Directory</h2>
  <div class="row" id="userContainer"></div>
</div>

<script>
fetch('https://jsonplaceholder.typicode.com/users')
  .then(res => res.json())
  .then(users => {
    let cards = "";
    users.forEach(user => {
      cards += `
        <div class="col-md-4 mb-3">
          <div class="card p-3">
            <img src="https://i.pravatar.cc/150?img=${user.id}"
                 class="rounded-circle mx-auto mb-2">
            <h5>${user.name}</h5>
            <p>${user.email}</p>
            <small>${user.company.name}</small>
          </div>
        </div>`;
    });
    document.getElementById("userContainer").innerHTML = cards;
  });
</script>

</body>
</html>
