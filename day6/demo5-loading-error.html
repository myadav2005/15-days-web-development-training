<!DOCTYPE html>
<html>
<head>
  <title>Loading & Error</title>
</head>
<body>

<div id="box">Loading users...</div>

<script>
function loadUsers() {
  document.getElementById("box").innerHTML = "⏳ Loading...";

  fetch('https://jsonplaceholder.typicode.com/users')
    .then(res => res.json())
    .then(data => {
      document.getElementById("box").innerHTML =
        "Users loaded: " + data.length;
    })
    .catch(() => {
      document.getElementById("box").innerHTML =
        "Failed to load users";
    });
}

loadUsers();
</script>

</body>
</html>
